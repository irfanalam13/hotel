name: hms

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hms}
      POSTGRES_DB: ${POSTGRES_DB:-hms}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hms}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    environment:
      DJANGO_ENV: ${DJANGO_ENV:-prod}
      DEBUG: ${DEBUG:-false}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      DATABASE_URL: postgres://${POSTGRES_USER:-hms}:${POSTGRES_PASSWORD:-hms}@db:5432/${POSTGRES_DB:-hms}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "false"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: celery -A config worker -l info
    environment:
      DJANGO_ENV: ${DJANGO_ENV:-prod}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me}
      DATABASE_URL: postgres://${POSTGRES_USER:-hms}:${POSTGRES_PASSWORD:-hms}@db:5432/${POSTGRES_DB:-hms}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: ./backend
    command: celery -A config beat -l info
    environment:
      DJANGO_ENV: ${DJANGO_ENV:-prod}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me}
      DATABASE_URL: postgres://${POSTGRES_USER:-hms}:${POSTGRES_PASSWORD:-hms}@db:5432/${POSTGRES_DB:-hms}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
